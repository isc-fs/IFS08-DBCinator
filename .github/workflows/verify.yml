name: Verify

# Single CI job that gates every PR into main: regenerate the
# artifacts in-memory and diff against the committed dist/, parse
# each DBC with cantools, and run the cross-ECU collision audit.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install cantools
        run: pip install cantools

      - name: Cross-ECU collision audit
        run: python3 -m tools.check_ids

      - name: dist/*.dbc match the generator
        run: python3 -m tools.gen_dbc --check

      - name: dist/ifs08_can_ids.h matches the generator
        run: python3 -m tools.gen_c_header --check

      - name: Parse each DBC with cantools
        run: |
          for f in dist/*.dbc; do
            python3 -c "import sys, cantools; db = cantools.database.load_file(sys.argv[1]); print(f'{sys.argv[1]}: {len(db.messages)} messages, {sum(len(m.signals) for m in db.messages)} signals')" "$f"
          done
