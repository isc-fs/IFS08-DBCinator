name: Verify

# Self-test for the runtime tools. Downloads the current dev DBC from
# IFS08-CE-AMS (the only repo on the code-first DSL today), runs the
# collision audit and the bus-load estimator against it. Fails the
# build if either flags an issue.
#
# The composite action in actions/dbc-bot/ is consumed by per-repo
# workflows; it isn't tested here (no PR-event harness). The fleet
# audit in fleet-audit.yml runs the same tools against the union of
# all ECU repos' tagged DBCs on a cron.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  audit-self-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install cantools
        run: pip install cantools

      - name: Pull AMS dev DBC
        run: |
          mkdir -p /tmp/dbcs
          curl -fsSL \
            https://raw.githubusercontent.com/isc-fs/IFS08-CE-AMS/dev/docs/dbc/ams.dbc \
            -o /tmp/dbcs/ams.dbc
          wc -l /tmp/dbcs/ams.dbc

      - name: Cross-repo collision audit
        run: python3 -m tools.check_ids --dbc /tmp/dbcs/ams.dbc

      - name: Bus-load estimate (fails > 80 % at 500 kbps)
        run: python3 -m tools.bus_load --dbc /tmp/dbcs/ams.dbc

      - name: PR-comment renderer smoke (unchanged + initialising paths)
        run: |
          # Render an unchanged comment.
          python3 tools/dbc_pr_comment.py \
            --before /tmp/dbcs/ams.dbc --after /tmp/dbcs/ams.dbc \
            --pr 0 --repo self-test --output /tmp/unchanged.md
          grep -q "wire contract unchanged" /tmp/unchanged.md

          # Render an initialising comment.
          : > /tmp/empty.dbc
          python3 tools/dbc_pr_comment.py \
            --before /tmp/empty.dbc --after /tmp/dbcs/ams.dbc \
            --pr 0 --repo self-test --output /tmp/init.md
          grep -q "initialising wire contract" /tmp/init.md
